<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#f0fdf4" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Neva Go Kurye" />
  <link rel="manifest" href="manifest.json" />
  <title>Neva Go Kurye</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ══════════════════════════════════
       DARK THEME (Admin + Login)
    ══════════════════════════════════ */
    :root {
      --dk-bg: #0b0c10;
      --dk-surface: #13151c;
      --dk-surface2: #1c1f2b;
      --dk-border: #252837;
      --dk-text: #e8eaf0;
      --dk-muted: #6b7280;
      --dk-accent: #16a34a;
      --dk-accent2: #3b82f6;
      --danger: #ef4444;
      --success: #22c55e;
      --radius: 14px;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    /* ══════════════════════════════════
       LIGHT THEME (Kurye)
    ══════════════════════════════════ */
    .lt {
      --lt-bg: #f0fdf4;
      --lt-surface: #ffffff;
      --lt-surface2: #f0fdf4;
      --lt-border: #bbf7d0;
      --lt-text: #14532d;
      --lt-muted: #6b7280;
      --lt-accent: #16a34a;
      --lt-accent-dark: #15803d;
      --lt-nakit: #d97706;
      --lt-pos: #0891b2;
      --lt-danger: #dc2626;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); min-height: 100dvh; overscroll-behavior: none; background: var(--dk-bg); }

    /* ══════════════════════════════════
       SCREEN SYSTEM
    ══════════════════════════════════ */
    .screen { display: none; min-height: 100dvh; }
    .screen.active { display: flex; flex-direction: column; }

    /* ══════════════════════════════════
       LOGIN — DARK
    ══════════════════════════════════ */
    #screen-login {
      background: radial-gradient(ellipse at 50% 0%, rgba(22,163,74,.15) 0%, transparent 65%), var(--dk-bg);
      align-items: center; justify-content: center; padding: 24px;
    }
    .login-box { width: 100%; max-width: 380px; }
    .login-logo {
      font-family: var(--font-display); font-size: 38px; letter-spacing: 2px;
      text-align: center; margin-bottom: 4px;
      background: linear-gradient(90deg, #4ade80, #16a34a);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .login-sub { text-align: center; color: var(--dk-muted); font-size: 14px; margin-bottom: 36px; }
    .login-card {
      background: var(--dk-surface); border: 1px solid var(--dk-border);
      border-radius: 20px; padding: 28px 24px;
    }
    .login-card h2 { font-family: var(--font-display); font-size: 22px; letter-spacing: 1px; margin-bottom: 20px; color: var(--dk-text); }

    /* dark inputs */
    .dk-input {
      width: 100%; background: var(--dk-surface2); border: 1px solid var(--dk-border);
      border-radius: 10px; padding: 12px 14px; color: var(--dk-text);
      font-family: var(--font-body); font-size: 15px; outline: none;
      transition: border-color .2s; -webkit-appearance: none;
    }
    .dk-input:focus { border-color: #16a34a; }
    .dk-label { display: block; font-size: 12px; font-weight: 600; color: var(--dk-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .8px; }
    .form-row { margin-bottom: 14px; }
    .login-error { color: var(--danger); font-size: 13px; text-align: center; margin-top: 10px; min-height: 18px; }

    /* ══════════════════════════════════
       BUTTONS
    ══════════════════════════════════ */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      font-family: var(--font-display); font-size: 18px; letter-spacing: 1.5px;
      cursor: pointer; transition: transform .15s, opacity .15s;
    }
    .btn:active { transform: scale(.97); opacity: .85; }

    /* dark theme buttons */
    .btn-primary-dk { background: linear-gradient(135deg, #16a34a, #4ade80); color: #fff; }
    .btn-ghost-dk { background: var(--dk-surface2); border: 1px solid var(--dk-border); color: var(--dk-text); font-family: var(--font-body); font-size: 14px; padding: 8px 14px; width: auto; border-radius: 8px; letter-spacing: 0; }
    .btn-success-dk { background: rgba(34,197,94,.15); color: var(--success); border: 1px solid rgba(34,197,94,.3); font-family: var(--font-body); font-size: 13px; padding: 8px 14px; width: auto; border-radius: 8px; letter-spacing: 0; }
    .btn-danger-dk { background: rgba(239,68,68,.12); color: var(--danger); border: 1px solid rgba(239,68,68,.3); font-family: var(--font-body); font-size: 13px; padding: 8px 12px; width: auto; border-radius: 8px; }

    /* light theme buttons */
    .btn-primary-lt { background: linear-gradient(135deg, #16a34a, #22c55e); color: #fff; font-weight: 700; box-shadow: 0 4px 14px rgba(22,163,74,.3); }
    .btn-ghost-lt { background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d; font-family: var(--font-body); font-size: 14px; padding: 9px 14px; width: auto; border-radius: 8px; letter-spacing: 0; font-weight: 500; }
    .btn-danger-lt { background: rgba(220,38,38,.08); color: #dc2626; border: 1px solid rgba(220,38,38,.25); font-family: var(--font-body); font-size: 13px; padding: 7px 10px; width: auto; border-radius: 8px; }

    /* ══════════════════════════════════
       ADMIN SCREEN — DARK
    ══════════════════════════════════ */
    #screen-admin { background: var(--dk-bg); color: var(--dk-text); }

    .dk-header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(11,12,16,0.92); backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--dk-border);
      padding: 0 16px; height: 60px; display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0;
    }
    .dk-logo {
      font-family: var(--font-display); font-size: 22px; letter-spacing: 2px;
      background: linear-gradient(90deg, #4ade80, #16a34a);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .admin-badge { font-size: 12px; color: var(--dk-accent2); font-weight: 700; letter-spacing: 1px; margin-left: 8px; -webkit-text-fill-color: var(--dk-accent2); }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .logout-btn-dk { background: none; border: 1px solid var(--dk-border); color: var(--dk-muted); border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: var(--font-body); transition: all .2s; }
    .logout-btn-dk:hover { border-color: var(--danger); color: var(--danger); }

    .dk-tabs { display: flex; background: var(--dk-surface); border-bottom: 1px solid var(--dk-border); overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
    .dk-tabs::-webkit-scrollbar { display: none; }
    .dk-tab-btn { flex: 1; min-width: 80px; padding: 12px 8px; background: none; border: none; color: var(--dk-muted); font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; white-space: nowrap; }
    .dk-tab-btn.active { color: #4ade80; border-bottom-color: #16a34a; }

    .dk-main { padding: 16px; max-width: 640px; width: 100%; margin: 0 auto; padding-bottom: 40px; flex: 1; overflow-y: auto; }

    .dk-card { background: var(--dk-surface); border: 1px solid var(--dk-border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
    .dk-card-title { font-family: var(--font-display); font-size: 20px; letter-spacing: 1px; margin-bottom: 16px; color: var(--dk-text); }

    .dk-filter { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
    .dk-filter .dk-input { flex: 1; min-width: 120px; padding: 10px 12px; font-size: 14px; }

    .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .report-card { background: var(--dk-surface2); border: 1px solid var(--dk-border); border-radius: 12px; padding: 16px; }
    .report-card-label { font-size: 12px; color: var(--dk-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .7px; margin-bottom: 8px; }
    .report-card-value { font-family: var(--font-display); font-size: 26px; letter-spacing: .5px; }
    .report-card.rc-nakit .report-card-value { color: #f59e0b; }
    .report-card.rc-pos .report-card-value { color: #22d3ee; }
    .report-card.rc-total { grid-column: 1/-1; }
    .report-card.rc-total .report-card-value { font-size: 32px; color: var(--dk-text); }

    .section-heading { font-family: var(--font-display); font-size: 14px; letter-spacing: 1px; color: var(--dk-muted); margin: 18px 0 10px; text-transform: uppercase; }

    .dk-courier-row { background: var(--dk-surface2); border: 1px solid var(--dk-border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; color: var(--dk-text); }
    .dk-courier-amounts { display: flex; gap: 14px; }

    .dk-entry-list { display: flex; flex-direction: column; gap: 10px; }
    .dk-entry-item { background: var(--dk-surface2); border: 1px solid var(--dk-border); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; animation: fadeUp .3s ease; color: var(--dk-text); }
    .dk-avatar { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, #16a34a, #4ade80); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 18px; color: #fff; flex-shrink: 0; }
    .dk-entry-info { flex: 1; min-width: 0; }
    .dk-entry-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dk-entry-date { font-size: 12px; color: var(--dk-muted); margin-top: 2px; }
    .dk-entry-amounts { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }

    .tag-nakit { display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 600; color: #f59e0b; }
    .tag-pos   { display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 600; color: #22d3ee; }
    .tag-dot-nakit { width: 6px; height: 6px; border-radius: 50%; background: #f59e0b; flex-shrink: 0; }
    .tag-dot-pos   { width: 6px; height: 6px; border-radius: 50%; background: #22d3ee; flex-shrink: 0; }

    .user-row { background: var(--dk-surface2); border: 1px solid var(--dk-border); border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
    .user-row-info { flex: 1; }
    .user-row-name { font-weight: 600; font-size: 14px; color: var(--dk-text); }
    .user-row-meta { font-size: 12px; color: var(--dk-muted); margin-top: 2px; }
    .user-row-actions { display: flex; gap: 8px; }
    .role-badge { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
    .role-badge.admin { background: rgba(59,130,246,.15); color: #60a5fa; border: 1px solid rgba(59,130,246,.3); }
    .role-badge.kurye { background: rgba(22,163,74,.15); color: #4ade80; border: 1px solid rgba(22,163,74,.3); }

    /* ══════════════════════════════════
       KURYE SCREEN — LIGHT
    ══════════════════════════════════ */
    #screen-kurye { background: var(--lt-bg, #f0fdf4); color: #14532d; }

    .lt-header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 2px solid #bbf7d0;
      padding: 0 16px; height: 64px; display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(22,163,74,.08);
    }
    .lt-logo-wrap { display: flex; flex-direction: column; line-height: 1; }
    .lt-logo { font-family: var(--font-display); font-size: 22px; letter-spacing: 2px; color: #16a34a; }
    .lt-logo-sub { font-size: 10px; font-weight: 700; color: #86efac; letter-spacing: 2px; text-transform: uppercase; margin-top: 1px; }
    .lt-user-badge { font-size: 13px; color: #15803d; font-weight: 600; }
    .logout-btn-lt { background: #f0fdf4; border: 1px solid #bbf7d0; color: #16a34a; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: var(--font-body); font-weight: 600; transition: all .2s; }
    .logout-btn-lt:hover { background: #dcfce7; }

    .lt-tabs { display: flex; background: #fff; border-bottom: 2px solid #bbf7d0; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
    .lt-tabs::-webkit-scrollbar { display: none; }
    .lt-tab-btn { flex: 1; min-width: 80px; padding: 12px 8px; background: none; border: none; color: #6b7280; font-family: var(--font-body); font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; transition: all .2s; white-space: nowrap; margin-bottom: -2px; }
    .lt-tab-btn.active { color: #16a34a; border-bottom-color: #16a34a; }

    .lt-main { padding: 16px; max-width: 600px; width: 100%; margin: 0 auto; padding-bottom: 40px; flex: 1; overflow-y: auto; }

    .lt-card { background: #fff; border: 1.5px solid #bbf7d0; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(22,163,74,.07); }
    .lt-card-title { font-family: var(--font-display); font-size: 20px; letter-spacing: 1px; margin-bottom: 16px; color: #15803d; }

    .lt-label { display: block; font-size: 12px; font-weight: 700; color: #16a34a; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .8px; }
    .lt-input {
      width: 100%; background: #f0fdf4; border: 1.5px solid #bbf7d0;
      border-radius: 10px; padding: 12px 14px; color: #14532d;
      font-family: var(--font-body); font-size: 15px; outline: none;
      transition: border-color .2s, box-shadow .2s; -webkit-appearance: none;
    }
    .lt-input:focus { border-color: #16a34a; box-shadow: 0 0 0 3px rgba(22,163,74,.1); }

    .lt-amount-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .lt-amount-box { border-radius: 12px; padding: 14px; position: relative; }
    .lt-amount-box.nakit { background: #fffbeb; border: 1.5px solid #fde68a; }
    .lt-amount-box.pos   { background: #ecfeff; border: 1.5px solid #a5f3fc; }
    .lt-amount-box .lt-label { margin-bottom: 4px; }
    .lt-amount-box.nakit .lt-label { color: #d97706; }
    .lt-amount-box.pos   .lt-label { color: #0891b2; }
    .lt-amount-input { background: transparent; border: none; outline: none; padding: 0; font-size: 22px; font-weight: 700; width: 100%; color: #14532d; }
    .lt-amount-box.nakit .lt-amount-input { color: #d97706; }
    .lt-amount-box.pos   .lt-amount-input { color: #0891b2; }
    .lt-currency { position: absolute; top: 12px; right: 12px; font-size: 12px; font-weight: 700; color: #9ca3af; }

    /* summary chips light */
    .lt-summary-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 0; }
    .lt-chip { border-radius: 14px; padding: 14px 10px; text-align: center; }
    .lt-chip.nakit { background: #fffbeb; border: 1.5px solid #fde68a; }
    .lt-chip.pos   { background: #ecfeff; border: 1.5px solid #a5f3fc; }
    .lt-chip.total { background: #f0fdf4; border: 1.5px solid #86efac; }
    .lt-chip-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; margin-bottom: 6px; }
    .lt-chip.nakit .lt-chip-label { color: #d97706; }
    .lt-chip.pos   .lt-chip-label { color: #0891b2; }
    .lt-chip.total .lt-chip-label { color: #16a34a; }
    .lt-chip-value { font-family: var(--font-display); font-size: 19px; letter-spacing: .3px; }
    .lt-chip.nakit .lt-chip-value { color: #d97706; }
    .lt-chip.pos   .lt-chip-value { color: #0891b2; }
    .lt-chip.total .lt-chip-value { color: #15803d; }

    /* entry list light */
    .lt-entry-list { display: flex; flex-direction: column; gap: 10px; }
    .lt-entry-item { background: #fff; border: 1.5px solid #bbf7d0; border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; animation: fadeUp .3s ease; box-shadow: 0 1px 4px rgba(22,163,74,.06); }
    .lt-avatar { width: 42px; height: 42px; border-radius: 12px; background: linear-gradient(135deg, #16a34a, #4ade80); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 20px; color: #fff; flex-shrink: 0; }
    .lt-entry-info { flex: 1; min-width: 0; }
    .lt-entry-name { font-weight: 700; font-size: 14px; color: #15803d; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lt-entry-date { font-size: 12px; color: #6b7280; margin-top: 2px; }
    .lt-entry-amounts { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
    .lt-tag-nakit { display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 700; color: #d97706; }
    .lt-tag-pos   { display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 700; color: #0891b2; }
    .lt-dot-nakit { width: 6px; height: 6px; border-radius: 50%; background: #d97706; }
    .lt-dot-pos   { width: 6px; height: 6px; border-radius: 50%; background: #0891b2; }

    .lt-filter-bar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
    .lt-filter-bar .lt-input { flex: 1; min-width: 120px; padding: 10px 12px; font-size: 14px; }

    /* ══════════════════════════════════
       MODALS
    ══════════════════════════════════ */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity .2s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--dk-surface); border: 1px solid var(--dk-border); border-radius: 20px; padding: 24px; width: 100%; max-width: 400px; transform: translateY(20px); transition: transform .25s; }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-title { font-family: var(--font-display); font-size: 22px; letter-spacing: 1px; margin-bottom: 20px; color: var(--dk-text); }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }

    /* ══════════════════════════════════
       SHARED
    ══════════════════════════════════ */
    @keyframes fadeUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
    .page { display: none; }
    .page.active { display: block; }
    .empty { text-align: center; padding: 48px 24px; color: #9ca3af; }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #16a34a; color: #fff; padding: 12px 24px; border-radius: 30px; font-weight: 600; font-size: 14px; z-index: 999; transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s; opacity: 0; white-space: nowrap; pointer-events: none; }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.error { background: var(--danger); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #bbf7d0; border-radius: 4px; }
  </style>
</head>
<body>

<!-- ══════════════════════════════════
     LOGIN SCREEN
══════════════════════════════════ -->
<div class="screen active" id="screen-login">
  <div class="login-box">
    <div class="login-logo">NEVA GO KURYE</div>
    <div class="login-sub">Motorlu Kurye Tahsilat Sistemi</div>
    <div class="login-card">
      <h2>Giriş Yap</h2>
      <div class="form-row">
        <label class="dk-label">Kullanıcı Adı</label>
        <input class="dk-input" type="text" id="loginUser" placeholder="kullanici_adi" autocomplete="username" autocapitalize="none" />
      </div>
      <div class="form-row">
        <label class="dk-label">Şifre</label>
        <input class="dk-input" type="password" id="loginPass" placeholder="••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()" />
      </div>
      <button class="btn btn-primary-dk" onclick="doLogin()">GİRİŞ YAP</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════
     KURYE SCREEN — LIGHT
══════════════════════════════════ -->
<div class="screen" id="screen-kurye">
  <header class="lt-header">
    <div class="lt-logo-wrap">
      <div class="lt-logo">NEVA GO KURYE</div>
      <div class="lt-logo-sub">Tahsilat Paneli</div>
    </div>
    <div class="header-right">
      <div class="lt-user-badge" id="kurye-username-badge"></div>
      <button class="logout-btn-lt" onclick="doLogout()">Çıkış</button>
    </div>
  </header>

  <div class="lt-tabs">
    <button class="lt-tab-btn active" onclick="switchKuryeTab('giris', this)">Giriş Yap</button>
    <button class="lt-tab-btn" onclick="switchKuryeTab('gecmis', this)">Geçmişim</button>
  </div>

  <main class="lt-main">
    <!-- Giriş -->
    <div class="page active" id="kurye-page-giris">
      <div class="lt-card">
        <div class="lt-card-title">Günlük Tahsilat Girişi</div>
        <div class="form-row">
          <label class="lt-label">Tarih</label>
          <input class="lt-input" type="date" id="k-tarih" />
        </div>
        <div class="form-row">
          <label class="lt-label">Tahsilat Tutarları</label>
          <div class="lt-amount-row">
            <div class="lt-amount-box nakit">
              <label class="lt-label">Nakit</label>
              <input class="lt-amount-input" type="number" id="k-nakit" placeholder="0" min="0" inputmode="decimal" />
              <span class="lt-currency">₺</span>
            </div>
            <div class="lt-amount-box pos">
              <label class="lt-label">POS</label>
              <input class="lt-amount-input" type="number" id="k-pos" placeholder="0" min="0" inputmode="decimal" />
              <span class="lt-currency">₺</span>
            </div>
          </div>
        </div>
        <div class="form-row">
          <label class="lt-label">Not (Opsiyonel)</label>
          <input class="lt-input" type="text" id="k-not" placeholder="Açıklama..." />
        </div>
        <button class="btn btn-primary-lt" onclick="kuryeKaydet()">KAYDET</button>
      </div>

      <div class="lt-card">
        <div class="lt-card-title">Bugünün Özeti</div>
        <div class="lt-summary-row">
          <div class="lt-chip nakit">
            <div class="lt-chip-label">Nakit</div>
            <div class="lt-chip-value" id="k-bugun-nakit">0 ₺</div>
          </div>
          <div class="lt-chip pos">
            <div class="lt-chip-label">POS</div>
            <div class="lt-chip-value" id="k-bugun-pos">0 ₺</div>
          </div>
          <div class="lt-chip total">
            <div class="lt-chip-label">Toplam</div>
            <div class="lt-chip-value" id="k-bugun-toplam">0 ₺</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Geçmiş -->
    <div class="page" id="kurye-page-gecmis">
      <div class="lt-filter-bar">
        <input class="lt-input" type="date" id="k-filtre-tarih" onchange="renderKuryeGecmis()" />
        <button class="btn btn-ghost-lt" onclick="getId('k-filtre-tarih').value=''; renderKuryeGecmis()">Tümü</button>
      </div>
      <div id="kurye-gecmis-list" class="lt-entry-list"></div>
    </div>
  </main>
</div>

<!-- ══════════════════════════════════
     ADMIN SCREEN — DARK
══════════════════════════════════ -->
<div class="screen" id="screen-admin">
  <header class="dk-header">
    <div style="display:flex;align-items:center">
      <div class="dk-logo">NEVA GO KURYE</div>
      <span class="admin-badge">YÖNETİCİ</span>
    </div>
    <div class="header-right">
      <button class="logout-btn-dk" onclick="doLogout()">Çıkış</button>
    </div>
  </header>

  <div class="dk-tabs">
    <button class="dk-tab-btn active" onclick="switchAdminTab('rapor', this)">Rapor</button>
    <button class="dk-tab-btn" onclick="switchAdminTab('kayitlar', this)">Tüm Kayıtlar</button>
    <button class="dk-tab-btn" onclick="switchAdminTab('kullanicilar', this)">Kullanıcılar</button>
  </div>

  <main class="dk-main">

    <!-- RAPOR -->
    <div class="page active" id="admin-page-rapor">
      <div class="dk-card">
        <div class="dk-card-title">Dönem & Kurye Filtresi</div>
        <div class="dk-filter" style="margin-bottom:10px">
          <input class="dk-input" type="date" id="a-rapor-bas" style="flex:1" />
          <span style="color:#6b7280;font-size:13px">—</span>
          <input class="dk-input" type="date" id="a-rapor-bit" style="flex:1" />
        </div>
        <div class="dk-filter" style="margin-bottom:0">
          <select class="dk-input" id="a-rapor-kurye" style="flex:1">
            <option value="">Tüm Kuryeler</option>
          </select>
          <button class="btn btn-primary-dk" style="width:auto;padding:10px 20px;font-size:16px" onclick="renderAdminRapor()">Getir</button>
        </div>
      </div>
      <div id="admin-rapor-icerik"></div>
    </div>

    <!-- TÜM KAYITLAR -->
    <div class="page" id="admin-page-kayitlar">
      <div class="dk-filter">
        <input class="dk-input" type="text" id="a-arama" placeholder="Kurye ara..." oninput="renderAdminKayitlar()" style="flex:1" />
        <input class="dk-input" type="date" id="a-filtre-tarih" onchange="renderAdminKayitlar()" style="flex:1" />
      </div>
      <div id="admin-kayit-list" class="dk-entry-list"></div>
    </div>

    <!-- KULLANICILAR -->
    <div class="page" id="admin-page-kullanicilar">
      <button class="btn btn-primary-dk" style="margin-bottom:16px" onclick="openUserModal()">+ YENİ KULLANICI EKLE</button>
      <div id="kullanici-list"></div>
    </div>

  </main>
</div>

<!-- KULLANICI MODAL -->
<div class="modal-overlay" id="user-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Yeni Kullanıcı</div>
    <div class="form-row">
      <label class="dk-label">Ad Soyad</label>
      <input class="dk-input" type="text" id="m-adSoyad" placeholder="Ali Yılmaz" />
    </div>
    <div class="form-row">
      <label class="dk-label">Kullanıcı Adı</label>
      <input class="dk-input" type="text" id="m-username" placeholder="ali_yilmaz" autocapitalize="none" />
    </div>
    <div class="form-row">
      <label class="dk-label">Şifre</label>
      <input class="dk-input" type="password" id="m-sifre" placeholder="En az 4 karakter" />
    </div>
    <div class="form-row">
      <label class="dk-label">Rol</label>
      <select class="dk-input" id="m-rol">
        <option value="kurye">Kurye</option>
        <option value="admin">Yönetici</option>
      </select>
    </div>
    <div class="login-error" id="modal-error"></div>
    <div class="modal-actions">
      <button class="btn btn-primary-dk" style="flex:1" onclick="saveUser()">KAYDET</button>
      <button class="btn btn-ghost-dk" onclick="closeUserModal()">İptal</button>
    </div>
  </div>
</div>

<!-- ŞİFRE MODAL -->
<div class="modal-overlay" id="pass-modal">
  <div class="modal">
    <div class="modal-title">Şifre Değiştir</div>
    <div class="form-row">
      <label class="dk-label">Yeni Şifre</label>
      <input class="dk-input" type="password" id="pm-sifre" placeholder="En az 4 karakter" />
    </div>
    <div class="login-error" id="pass-modal-error"></div>
    <div class="modal-actions">
      <button class="btn btn-primary-dk" style="flex:1" onclick="savePass()">KAYDET</button>
      <button class="btn btn-ghost-dk" onclick="closePassModal()">İptal</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════
// STORAGE
// ══════════════════════════════════
const USERS_KEY   = 'kt_users_v1';
const RECORDS_KEY = 'kt_records_v1';
function getUsers()   { try { return JSON.parse(localStorage.getItem(USERS_KEY)   || '[]'); } catch { return []; } }
function saveUsers(u) { localStorage.setItem(USERS_KEY, JSON.stringify(u)); }
function getRecords()   { try { return JSON.parse(localStorage.getItem(RECORDS_KEY) || '[]'); } catch { return []; } }
function saveRecords(r) { localStorage.setItem(RECORDS_KEY, JSON.stringify(r)); }

function ensureAdmin() {
  const users = getUsers();
  if (!users.find(u => u.username === 'admin')) {
    users.unshift({ id: 1, adSoyad: 'Yönetici', username: 'admin', password: 'admin123', role: 'admin' });
    saveUsers(users);
  }
}

// ══════════════════════════════════
// SESSION
// ══════════════════════════════════
let currentUser = null;

function doLogin() {
  const u = gv('loginUser').trim().toLowerCase();
  const p = gv('loginPass');
  gi('loginError').textContent = '';
  ensureAdmin();
  const found = getUsers().find(x => x.username.toLowerCase() === u && x.password === p);
  if (!found) { gi('loginError').textContent = 'Kullanıcı adı veya şifre hatalı.'; return; }
  currentUser = found;
  gi('loginUser').value = '';
  gi('loginPass').value = '';
  if (found.role === 'admin') showScreen('admin');
  else showScreen('kurye');
}

function doLogout() { currentUser = null; showScreen('login'); }

// ══════════════════════════════════
// SCREEN ROUTING
// ══════════════════════════════════
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  gi('screen-' + name).classList.add('active');

  if (name === 'kurye') {
    gi('kurye-username-badge').textContent = currentUser.adSoyad;
    gi('k-tarih').value = todayStr();
    renderKuryeBugun();
    renderKuryeGecmis();
    switchKuryeTab('giris', document.querySelector('#screen-kurye .lt-tab-btn'));
  }
  if (name === 'admin') {
    fillKuryeSelect();
    setDefaultRaporDates();
    renderAdminRapor();
    renderAdminKayitlar();
    renderKullanicilar();
  }
}

// ══════════════════════════════════
// TAB SWITCHING
// ══════════════════════════════════
function switchKuryeTab(tab, btn) {
  document.querySelectorAll('#screen-kurye .page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('#screen-kurye .lt-tab-btn').forEach(b => b.classList.remove('active'));
  gi('kurye-page-' + tab).classList.add('active');
  if (btn) btn.classList.add('active');
  if (tab === 'gecmis') renderKuryeGecmis();
}

function switchAdminTab(tab, btn) {
  document.querySelectorAll('#screen-admin .page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('#screen-admin .dk-tab-btn').forEach(b => b.classList.remove('active'));
  gi('admin-page-' + tab).classList.add('active');
  if (btn) btn.classList.add('active');
  if (tab === 'kayitlar') renderAdminKayitlar();
  if (tab === 'kullanicilar') renderKullanicilar();
  if (tab === 'rapor') renderAdminRapor();
}

// ══════════════════════════════════
// KURYE — KAYIT EKLE
// ══════════════════════════════════
function kuryeKaydet() {
  const tarih = gv('k-tarih');
  const nakit = parseFloat(gv('k-nakit')) || 0;
  const pos   = parseFloat(gv('k-pos'))   || 0;
  const not   = gv('k-not').trim();
  if (!tarih) { showToast('Tarih seçiniz!', true); return; }
  if (nakit === 0 && pos === 0) { showToast('En az bir tutar giriniz!', true); return; }
  const records = getRecords();
  records.unshift({ id: Date.now(), userId: currentUser.id, username: currentUser.username, adSoyad: currentUser.adSoyad, tarih, nakit, pos, not, toplam: nakit + pos });
  saveRecords(records);
  gi('k-nakit').value = '';
  gi('k-pos').value   = '';
  gi('k-not').value   = '';
  renderKuryeBugun();
  showToast('Kayıt eklendi!');
}

function renderKuryeBugun() {
  if (!currentUser) return;
  const records = getRecords().filter(r => r.userId === currentUser.id && r.tarih === todayStr());
  const nakit = records.reduce((s, r) => s + r.nakit, 0);
  const pos   = records.reduce((s, r) => s + r.pos,   0);
  gi('k-bugun-nakit').textContent  = fmt(nakit);
  gi('k-bugun-pos').textContent    = fmt(pos);
  gi('k-bugun-toplam').textContent = fmt(nakit + pos);
}

function renderKuryeGecmis() {
  if (!currentUser) return;
  const filtre = gv('k-filtre-tarih');
  let records = getRecords().filter(r => r.userId === currentUser.id);
  if (filtre) records = records.filter(r => r.tarih === filtre);
  const el = gi('kurye-gecmis-list');
  el.innerHTML = records.length === 0
    ? `<div class="empty"><div class="empty-icon">🏍️</div><div>Kayıt bulunamadı</div></div>`
    : records.map(r => ltEntryHtml(r)).join('');
}

// ══════════════════════════════════
// ADMIN — KAYITLAR
// ══════════════════════════════════
function renderAdminKayitlar() {
  const arama  = (gv('a-arama') || '').toLowerCase();
  const filtre = gv('a-filtre-tarih');
  let records = getRecords();
  if (arama)  records = records.filter(r => r.adSoyad.toLowerCase().includes(arama) || r.username.toLowerCase().includes(arama));
  if (filtre) records = records.filter(r => r.tarih === filtre);
  const el = gi('admin-kayit-list');
  el.innerHTML = records.length === 0
    ? `<div class="empty"><div class="empty-icon">📋</div><div>Kayıt bulunamadı</div></div>`
    : records.map(r => dkEntryHtml(r)).join('');
}

function adminSil(id) {
  if (!confirm('Bu kaydı silmek istediğinize emin misiniz?')) return;
  saveRecords(getRecords().filter(r => r.id !== id));
  renderAdminKayitlar();
  renderAdminRapor();
  showToast('Kayıt silindi');
}

// ══════════════════════════════════
// ADMIN — RAPOR
// ══════════════════════════════════
function fillKuryeSelect() {
  const sel = gi('a-rapor-kurye');
  const users = getUsers().filter(u => u.role === 'kurye');
  sel.innerHTML = '<option value="">Tüm Kuryeler</option>' +
    users.map(u => `<option value="${u.id}">${esc(u.adSoyad)} (@${esc(u.username)})</option>`).join('');
}

function setDefaultRaporDates() {
  const bit = new Date(), bas = new Date();
  bas.setDate(bas.getDate() - 6);
  gi('a-rapor-bit').value = toDateStr(bit);
  gi('a-rapor-bas').value = toDateStr(bas);
}

function renderAdminRapor() {
  const bas    = gv('a-rapor-bas');
  const bit    = gv('a-rapor-bit');
  const userId = gv('a-rapor-kurye');
  const el     = gi('admin-rapor-icerik');
  if (!bas || !bit) { el.innerHTML = ''; return; }

  let records = getRecords().filter(r => r.tarih >= bas && r.tarih <= bit);
  if (userId) records = records.filter(r => String(r.userId) === userId);

  const topNakit = records.reduce((s, r) => s + r.nakit, 0);
  const topPos   = records.reduce((s, r) => s + r.pos,   0);

  const map = {};
  records.forEach(r => {
    if (!map[r.userId]) map[r.userId] = { adSoyad: r.adSoyad, nakit: 0, pos: 0 };
    map[r.userId].nakit += r.nakit;
    map[r.userId].pos   += r.pos;
  });
  const sorted = Object.values(map).sort((a, b) => (b.nakit + b.pos) - (a.nakit + a.pos));

  el.innerHTML = `
    <div class="dk-card">
      <div class="dk-card-title">${fmtTarih(bas)} – ${fmtTarih(bit)}</div>
      <div class="report-grid">
        <div class="report-card rc-nakit"><div class="report-card-label">Toplam Nakit</div><div class="report-card-value">${fmt(topNakit)}</div></div>
        <div class="report-card rc-pos"><div class="report-card-label">Toplam POS</div><div class="report-card-value">${fmt(topPos)}</div></div>
        <div class="report-card rc-total"><div class="report-card-label">Genel Toplam · ${records.length} kayıt</div><div class="report-card-value">${fmt(topNakit + topPos)}</div></div>
      </div>
    </div>
    ${sorted.length > 0 ? `
      <div class="section-heading">Kurye Bazlı</div>
      ${sorted.map(v => `
        <div class="dk-courier-row">
          <div style="font-weight:600">${esc(v.adSoyad)}</div>
          <div class="dk-courier-amounts">
            <span class="tag-nakit"><span class="tag-dot-nakit"></span>${fmt(v.nakit)}</span>
            <span class="tag-pos"><span class="tag-dot-pos"></span>${fmt(v.pos)}</span>
          </div>
        </div>
      `).join('')}
    ` : `<div class="empty"><div class="empty-icon">📊</div><div>Bu dönemde kayıt yok</div></div>`}
  `;
}

// ══════════════════════════════════
// ADMIN — KULLANICI YÖNETİMİ
// ══════════════════════════════════
function renderKullanicilar() {
  const el = gi('kullanici-list');
  el.innerHTML = getUsers().map(u => `
    <div class="user-row">
      <div class="user-row-info">
        <div class="user-row-name">${esc(u.adSoyad)} <span class="role-badge ${u.role}">${u.role === 'admin' ? 'Yönetici' : 'Kurye'}</span></div>
        <div class="user-row-meta">@${esc(u.username)}</div>
      </div>
      <div class="user-row-actions">
        <button class="btn btn-success-dk" onclick="openPassModal(${u.id})">Şifre</button>
        ${u.username !== 'admin' ? `<button class="btn btn-danger-dk" onclick="deleteUser(${u.id})">Sil</button>` : ''}
      </div>
    </div>
  `).join('') || `<div class="empty"><div>Kullanıcı yok</div></div>`;
}

let editUserId = null;
function openUserModal() {
  editUserId = null;
  gi('modal-title').textContent = 'Yeni Kullanıcı';
  ['m-adSoyad','m-username','m-sifre'].forEach(id => gi(id).value = '');
  gi('m-rol').value = 'kurye';
  gi('modal-error').textContent = '';
  gi('user-modal').classList.add('open');
}
function closeUserModal() { gi('user-modal').classList.remove('open'); }

function saveUser() {
  const adSoyad  = gv('m-adSoyad').trim();
  const username = gv('m-username').trim().toLowerCase();
  const sifre    = gv('m-sifre');
  const rol      = gv('m-rol');
  if (!adSoyad || !username || !sifre) { gi('modal-error').textContent = 'Tüm alanları doldurun.'; return; }
  if (sifre.length < 4) { gi('modal-error').textContent = 'Şifre en az 4 karakter olmalı.'; return; }
  if (!/^[a-z0-9_]+$/.test(username)) { gi('modal-error').textContent = 'Kullanıcı adı sadece harf, rakam ve _ içerebilir.'; return; }
  const users = getUsers();
  if (users.find(u => u.username === username)) { gi('modal-error').textContent = 'Bu kullanıcı adı zaten kullanılıyor.'; return; }
  users.push({ id: Date.now(), adSoyad, username, password: sifre, role: rol });
  saveUsers(users);
  closeUserModal();
  renderKullanicilar();
  fillKuryeSelect();
  showToast('Kullanıcı eklendi!');
}

function deleteUser(id) {
  if (!confirm('Bu kullanıcıyı silmek istiyor musunuz? Kayıtları silinmez.')) return;
  saveUsers(getUsers().filter(u => u.id !== id));
  renderKullanicilar();
  fillKuryeSelect();
  showToast('Kullanıcı silindi');
}

let passTargetId = null;
function openPassModal(id) { passTargetId = id; gi('pm-sifre').value = ''; gi('pass-modal-error').textContent = ''; gi('pass-modal').classList.add('open'); }
function closePassModal() { gi('pass-modal').classList.remove('open'); }
function savePass() {
  const sifre = gv('pm-sifre');
  if (sifre.length < 4) { gi('pass-modal-error').textContent = 'Şifre en az 4 karakter olmalı.'; return; }
  saveUsers(getUsers().map(u => u.id === passTargetId ? { ...u, password: sifre } : u));
  closePassModal();
  showToast('Şifre güncellendi!');
}

gi('user-modal').addEventListener('click', e => { if (e.target === gi('user-modal')) closeUserModal(); });
gi('pass-modal').addEventListener('click', e => { if (e.target === gi('pass-modal')) closePassModal(); });

// ══════════════════════════════════
// ENTRY HTML HELPERS
// ══════════════════════════════════
function ltEntryHtml(r) {
  return `
    <div class="lt-entry-item">
      <div class="lt-avatar">${esc(r.adSoyad).charAt(0).toUpperCase()}</div>
      <div class="lt-entry-info">
        <div class="lt-entry-name">${esc(r.adSoyad)}</div>
        <div class="lt-entry-date">${fmtTarih(r.tarih)}${r.not ? ' · ' + esc(r.not) : ''}</div>
      </div>
      <div class="lt-entry-amounts">
        <div class="lt-tag-nakit"><span class="lt-dot-nakit"></span>${fmt(r.nakit)}</div>
        <div class="lt-tag-pos"><span class="lt-dot-pos"></span>${fmt(r.pos)}</div>
      </div>
    </div>`;
}

function dkEntryHtml(r) {
  return `
    <div class="dk-entry-item">
      <div class="dk-avatar">${esc(r.adSoyad).charAt(0).toUpperCase()}</div>
      <div class="dk-entry-info">
        <div class="dk-entry-name">${esc(r.adSoyad)}</div>
        <div class="dk-entry-date">${fmtTarih(r.tarih)}${r.not ? ' · ' + esc(r.not) : ''}</div>
      </div>
      <div class="dk-entry-amounts">
        <div class="tag-nakit"><span class="tag-dot-nakit"></span>${fmt(r.nakit)}</div>
        <div class="tag-pos"><span class="tag-dot-pos"></span>${fmt(r.pos)}</div>
      </div>
      <button class="btn btn-danger-dk" onclick="adminSil(${r.id})">✕</button>
    </div>`;
}

// ══════════════════════════════════
// UTILS
// ══════════════════════════════════
function gi(id)  { return document.getElementById(id); }
function getId(id) { return document.getElementById(id); }
function gv(id)  { return (gi(id) || {}).value || ''; }
function esc(s)  { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(n)  { return Number(n||0).toLocaleString('tr-TR', { minimumFractionDigits: 0, maximumFractionDigits: 2 }) + ' ₺'; }
function todayStr()   { return new Date().toISOString().split('T')[0]; }
function toDateStr(d) { return d.toISOString().split('T')[0]; }
function fmtTarih(d)  { if (!d) return ''; const [y,m,g] = d.split('-'); return `${g}.${m}.${y}`; }

function showToast(msg, isError = false) {
  const t = gi('toast');
  t.textContent = msg;
  t.className = isError ? 'error show' : 'show';
  setTimeout(() => t.className = '', 2200);
}

ensureAdmin();
</script>
</body>
</html>
